server {
    listen 80;
    server_name your-domain.example;
    return 301 https://$host$request_uri;
}

limit_req_zone $binary_remote_addr zone=hegel_login_ip:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=hegel_general:10m rate=120r/m;

server {
    listen 443 ssl http2;
    server_name your-domain.example;

    ssl_certificate     /etc/letsencrypt/live/your-domain.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.example/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 16m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Replace these placeholders before installing the template.
    set $hegel_origin "http://HEGEL_ORIGIN_HOST:HEGEL_ORIGIN_PORT";

    location /api/auth/login {
        limit_req zone=hegel_login_ip burst=5 nodelay;
        proxy_pass $hegel_origin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/auth/register/send-code {
        limit_req zone=hegel_login_ip burst=5 nodelay;
        proxy_pass $hegel_origin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/auth/password/send-code {
        limit_req zone=hegel_login_ip burst=5 nodelay;
        proxy_pass $hegel_origin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /admin.html {
        allow 127.0.0.1;
        allow ::1;
        deny all;

        proxy_pass $hegel_origin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        limit_req zone=hegel_general burst=40 nodelay;
        proxy_pass $hegel_origin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
